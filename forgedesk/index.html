    <script src="/fouc.js"></script>
    <style>
      /* Boot-splash: zichtbaar tot React mount, daarna vervangen. */
      .boot-splash {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #F8F7F5;
      }
      html.dark .boot-splash { background: #08161A; }
      .boot-logo {
        font-family: 'Bricolage Grotesque', system-ui, sans-serif;
        font-weight: 800;
        font-size: 34px;
        letter-spacing: -0.02em;
        color: #1A535C;
        animation: boot-pulse 1.6s ease-in-out infinite;
      }
      html.dark .boot-logo { color: #E8EDEE; }
      .boot-logo .dot { color: #F15025; }
      @keyframes boot-pulse {
        0%, 100% { opacity: 0.5; }
        50% { opacity: 1; }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="boot-splash">
        <span class="boot-logo">doen<span class="dot">.</span></span>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
