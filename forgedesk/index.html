<!DOCTYPE html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Doen.</title>
    <meta name="description" content="Doen. — CRM en projectmanagement voor vakmensen">
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@700;800&family=DM+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <script>
      // Laad opgeslagen grootte-instelling direct om FOUC te voorkomen
      document.documentElement.style.setProperty('--font-family', "'IBM Plex Sans'");
      try {
        const s = JSON.parse(localStorage.getItem('forgedesk_weergave_instellingen') || '{}');
        const sizes = { klein: '14px', normaal: '16px', groot: '18px', 'extra-groot': '20px' };
        if (s.font_size && sizes[s.font_size]) document.documentElement.style.setProperty('--font-size', sizes[s.font_size]);
      } catch(e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
